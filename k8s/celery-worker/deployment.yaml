apiVersion: apps/v1
kind: Deployment
metadata: { name: celery-worker, namespace: ecommerce }
spec:
  replicas: 2
  selector: { matchLabels: { app: celery-worker } }
  template:
    metadata: { labels: { app: celery-worker } }
    spec:
      containers:
        - name: celery-worker
          image: ecommerce/backend:latest
          command: [celery, -A, app.tasks.celery_app, worker, --loglevel=info, --concurrency=4]
          envFrom: [{ configMapRef: { name: ecommerce-config } }, { secretRef: { name: ecommerce-secrets } }]
          resources: { requests: { memory: 256Mi, cpu: 250m }, limits: { memory: 1Gi, cpu: "1" } }
