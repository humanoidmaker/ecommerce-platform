apiVersion: apps/v1
kind: Deployment
metadata: { name: celery-beat, namespace: ecommerce }
spec:
  replicas: 1
  selector: { matchLabels: { app: celery-beat } }
  template:
    metadata: { labels: { app: celery-beat } }
    spec:
      containers:
        - name: celery-beat
          image: ecommerce/backend:latest
          command: [celery, -A, app.tasks.celery_app, beat, --loglevel=info]
          envFrom: [{ configMapRef: { name: ecommerce-config } }, { secretRef: { name: ecommerce-secrets } }]
          resources: { requests: { memory: 128Mi, cpu: 100m } }
