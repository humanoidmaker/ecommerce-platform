apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: { name: ecommerce-ingress, namespace: ecommerce, annotations: { nginx.ingress.kubernetes.io/proxy-body-size: "50m" } }
spec:
  ingressClassName: nginx
  rules:
    - host: ecommerce.local
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: frontend-buyer-svc, port: { number: 80 } } } }] }
    - host: seller.ecommerce.local
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: frontend-seller-svc, port: { number: 80 } } } }] }
    - host: admin.ecommerce.local
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: frontend-admin-svc, port: { number: 80 } } } }] }
    - host: api.ecommerce.local
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: backend-svc, port: { number: 8000 } } } }] }
