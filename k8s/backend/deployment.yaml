apiVersion: apps/v1
kind: Deployment
metadata: { name: backend, namespace: ecommerce }
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: ecommerce/backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom: [{ configMapRef: { name: ecommerce-config } }, { secretRef: { name: ecommerce-secrets } }]
          resources: { requests: { memory: 256Mi, cpu: 250m }, limits: { memory: 1Gi, cpu: "1" } }
          readinessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 10, periodSeconds: 10 }
