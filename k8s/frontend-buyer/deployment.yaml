apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend-buyer, namespace: ecommerce }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend-buyer } }
  template:
    metadata: { labels: { app: frontend-buyer } }
    spec:
      containers:
        - name: frontend-buyer
          image: ecommerce/frontend-buyer:latest
          ports: [{ containerPort: 80 }]
          resources: { requests: { memory: 64Mi, cpu: 50m }, limits: { memory: 128Mi, cpu: 200m } }
