version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  mailhog:
    image: mailhog/mailhog:latest
    ports: ["1025:1025", "8025:8025"]

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BAZAAR_DATABASE_URL: postgresql+asyncpg://ecommerce:ecommerce@postgres:5432/ecommerce
      BAZAAR_REDIS_URL: redis://redis:6379/0
      BAZAAR_CELERY_BROKER_URL: redis://redis:6379/1
      BAZAAR_CELERY_RESULT_BACKEND: redis://redis:6379/2
      BAZAAR_MINIO_ENDPOINT: minio:9000
      BAZAAR_SMTP_HOST: mailhog
      BAZAAR_SMTP_PORT: "1025"
      BAZAAR_DEBUG: "true"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: [./backend:/app]

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      BAZAAR_DATABASE_URL: postgresql+asyncpg://ecommerce:ecommerce@postgres:5432/ecommerce
      BAZAAR_REDIS_URL: redis://redis:6379/0
      BAZAAR_CELERY_BROKER_URL: redis://redis:6379/1
      BAZAAR_MINIO_ENDPOINT: minio:9000
      BAZAAR_SMTP_HOST: mailhog
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: [./backend:/app]

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      BAZAAR_CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      redis: { condition: service_healthy }

  frontend-buyer:
    build: ./frontend-buyer
    ports: ["3000:80"]
    depends_on: [backend]

  frontend-seller:
    build: ./frontend-seller
    ports: ["3001:80"]
    depends_on: [backend]

  frontend-admin:
    build: ./frontend-admin
    ports: ["3002:80"]
    depends_on: [backend]

volumes:
  pgdata:
  miniodata:
